name: native

on:
  push:
  pull_request:

jobs:
  native:
    name: native (${{ matrix.flag }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        run: moon version

      - name: Check native package
        run: moon check --target native

      - name: Test with coverage
        run: moon test --target native --enable-coverage

      - name: Write Cobertura coverage
        run: moon coverage analyze -p justjavac/platform -- -f cobertura -o ${{ matrix.coverage_file }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: native-${{ matrix.flag }}
          disable_search: true
